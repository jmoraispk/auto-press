<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    Open Graph image — 1200×630 still that mirrors the hero scene:
    brand mark + tagline on the left, simplified laptop ↔ phone on the
    right with a static beam between them. SVG keeps the file tiny
    (~6 KB) and renders crisp on retina; if a particular unfurler
    refuses SVG (some Slack tenants do, occasionally WhatsApp), drop a
    PNG export at /assets/og.png and update the meta tags accordingly.

    Coordinate system: 1200×630, Facebook-recommended OG ratio.
  -->

  <defs>
    <!-- Page background — the same dark + soft aurora as the hero. -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a0a0d"/>
      <stop offset="100%" stop-color="#050608"/>
    </linearGradient>
    <radialGradient id="auroraA" cx="0.55" cy="-0.05" r="0.7">
      <stop offset="0%"  stop-color="#7da7e8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7da7e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraB" cx="0.85" cy="0.4" r="0.55">
      <stop offset="0%"  stop-color="#a78bfa" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>

    <!-- Brand-mark gradient (matches the favicon and the H1 'away'). -->
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#7da7e8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Beam: linear gradient with the bright spot in the middle. -->
    <linearGradient id="beamGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7da7e8" stop-opacity="0"/>
      <stop offset="55%"  stop-color="#7da7e8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background plate -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#auroraA)"/>
  <rect width="1200" height="630" fill="url(#auroraB)"/>

  <!-- ===== LEFT: brand block ============================== -->
  <g transform="translate(70, 84)">
    <!-- Brand mark: rounded square with the angle-bracket mark -->
    <rect x="0" y="0" width="56" height="56" rx="13" fill="#101118" stroke="rgba(125,167,232,0.35)" stroke-width="1"/>
    <g stroke="url(#brandGrad)" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(11, 11)">
      <polyline points="14 6 5 17 14 28"/>
      <polyline points="20 6 29 17 20 28"/>
    </g>
    <text x="78" y="38" font-family="-apple-system, Segoe UI, Inter, sans-serif" font-size="28" font-weight="600" fill="#e8e8ee" letter-spacing="-0.5">CodeAway</text>
  </g>

  <!-- Tagline -->
  <text x="70" y="270" font-family="-apple-system, Segoe UI, Inter, sans-serif" font-size="74" font-weight="600" fill="#ececf2" letter-spacing="-2">Code <tspan font-style="italic" font-weight="500" fill="url(#brandGrad)">away</tspan>.</text>

  <!-- Subtitle -->
  <text x="70" y="338" font-family="-apple-system, Segoe UI, Inter, sans-serif" font-size="26" fill="#9696a4" letter-spacing="-0.3">Open-source automation for IDEs and AI agents.</text>
  <text x="70" y="376" font-family="-apple-system, Segoe UI, Inter, sans-serif" font-size="26" fill="#9696a4" letter-spacing="-0.3">Walk away from your desk; your agents won't.</text>

  <!-- Compatibility row -->
  <g transform="translate(70, 466)" font-family="-apple-system, Segoe UI, Inter, sans-serif">
    <text x="0" y="14" font-size="13" letter-spacing="2.4" fill="#62626f" font-weight="500">WORKS WITH</text>
    <g transform="translate(150, 0)">
      <rect x="0"   y="-2" width="120" height="28" rx="14" fill="rgba(255,255,255,0.025)" stroke="#2a2a36" stroke-width="1"/>
      <text x="60"  y="17" text-anchor="middle" font-size="13" font-family="JetBrains Mono, SF Mono, Menlo, monospace" fill="#ececf2" font-weight="500">Claude Code</text>
      <rect x="132" y="-2" width="80"  height="28" rx="14" fill="rgba(255,255,255,0.025)" stroke="#2a2a36" stroke-width="1"/>
      <text x="172" y="17" text-anchor="middle" font-size="13" font-family="JetBrains Mono, SF Mono, Menlo, monospace" fill="#ececf2" font-weight="500">Cursor</text>
      <rect x="224" y="-2" width="80"  height="28" rx="14" fill="rgba(255,255,255,0.025)" stroke="#2a2a36" stroke-width="1"/>
      <text x="264" y="17" text-anchor="middle" font-size="13" font-family="JetBrains Mono, SF Mono, Menlo, monospace" fill="#ececf2" font-weight="500">Codex</text>
    </g>
  </g>

  <!-- Footer URL strip -->
  <text x="70" y="570" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="14" fill="#62626f" letter-spacing="0.5">codeaway.dev</text>
  <text x="1130" y="570" text-anchor="end" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="14" fill="#62626f" letter-spacing="0.5">github.com/jmoraispk/codeaway</text>

  <!-- ===== RIGHT: laptop + beam + phone =================== -->

  <!-- Laptop frame (positioned inside the right half) -->
  <g transform="translate(700, 130)">
    <!-- Outer frame + drop shadow -->
    <rect x="0" y="0" width="320" height="200" rx="14" fill="#101118" stroke="#2a2a36" stroke-width="1"/>
    <!-- Screen area -->
    <g transform="translate(10, 10)">
      <rect width="300" height="180" rx="8" fill="#0e1118" stroke="#1d1d25" stroke-width="1"/>
      <!-- Title bar -->
      <rect width="300" height="26" rx="8" fill="rgba(255,255,255,0.025)"/>
      <rect y="20" width="300" height="6" fill="rgba(255,255,255,0.025)"/>
      <!-- Traffic lights -->
      <circle cx="14" cy="13" r="4" fill="#ff5f57" fill-opacity="0.85"/>
      <circle cx="28" cy="13" r="4" fill="#febc2e" fill-opacity="0.85"/>
      <circle cx="42" cy="13" r="4" fill="#28c840" fill-opacity="0.85"/>
      <text x="64" y="17" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="10" fill="#62626f">Cursor — main</text>
      <line x1="0" y1="26" x2="300" y2="26" stroke="#1d1d25" stroke-width="1"/>

      <!-- User message -->
      <rect x="138" y="44" width="150" height="26" rx="6" fill="rgba(255,255,255,0.04)"/>
      <text x="146" y="62" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="10" fill="#9696a4">Refactor press_engine.py</text>

      <!-- Agent message -->
      <rect x="14" y="80" width="180" height="34" rx="6" fill="rgba(125,167,232,0.08)" stroke="rgba(125,167,232,0.18)" stroke-width="1"/>
      <text x="22" y="98"  font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="10" fill="#ececf2">Updated press_engine.py.</text>
      <text x="22" y="111" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="10" fill="#9696a4">Apply this change?</text>

      <!-- Continue button -->
      <rect x="218" y="138" width="70" height="28" rx="7" fill="#7da7e8"/>
      <!-- Glow halo to suggest "just clicked" -->
      <rect x="216" y="136" width="74" height="32" rx="9" fill="none" stroke="#7da7e8" stroke-opacity="0.45" stroke-width="3"/>
      <text x="253" y="156" text-anchor="middle" font-family="-apple-system, Segoe UI, Inter, sans-serif" font-size="12" font-weight="600" fill="#08080b">Continue</text>
    </g>
    <!-- Hinge -->
    <rect x="120" y="200" width="80" height="4" rx="2" fill="#2a2a36" opacity="0.6"/>
  </g>

  <!-- Beam between laptop and phone -->
  <line x1="1024" y1="232" x2="1086" y2="232" stroke="rgba(125,167,232,0.18)" stroke-width="1.4"/>
  <line x1="1024" y1="232" x2="1086" y2="232" stroke="url(#beamGrad)" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Static "particle" — three softly-glowing dots so the beam reads as
       active even without animation. -->
  <circle cx="1042" cy="232" r="2.5" fill="#7da7e8"/>
  <circle cx="1055" cy="232" r="2.5" fill="#7da7e8" opacity="0.7"/>
  <circle cx="1068" cy="232" r="2.5" fill="#a78bfa" opacity="0.4"/>

  <!-- Phone -->
  <g transform="translate(1090, 130)">
    <!-- Bezel -->
    <rect x="0" y="0" width="80" height="200" rx="14" fill="#08090d" stroke="#1c1e26" stroke-width="1"/>
    <!-- Notch -->
    <rect x="28" y="6" width="24" height="4" rx="2" fill="#050608"/>
    <!-- Screen -->
    <rect x="5" y="5" width="70" height="190" rx="11" fill="#0e1118"/>

    <g transform="translate(10, 16)">
      <!-- Status bar -->
      <text x="0" y="6" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="6" fill="#9696a4">9:41</text>
      <circle cx="50" cy="4" r="1.2" fill="#9696a4"/>
      <circle cx="55" cy="4" r="1.2" fill="#9696a4"/>
      <circle cx="60" cy="4" r="1.2" fill="#9696a4"/>

      <!-- App title -->
      <text x="0" y="22" font-family="-apple-system, Segoe UI, Inter, sans-serif" font-size="8" font-weight="600" fill="#ececf2">CodeAway</text>

      <!-- Window card -->
      <rect x="0" y="32" width="60" height="22" rx="4" fill="rgba(255,255,255,0.04)" stroke="#1d1d25" stroke-width="1"/>
      <circle cx="6" cy="43" r="3" fill="#22c55e"/>
      <circle cx="6" cy="43" r="5" fill="none" stroke="#22c55e" stroke-opacity="0.18" stroke-width="2"/>
      <text x="13" y="46" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="6" fill="#ececf2">Cursor — main</text>

      <!-- Composer (bottom anchor) -->
      <rect x="0" y="146" width="60" height="22" rx="4" fill="rgba(255,255,255,0.05)" stroke="#1d1d25" stroke-width="1"/>
      <text x="3" y="159" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="5.5" fill="#ececf2">Continue with…</text>
      <circle cx="52" cy="157" r="6" fill="#7da7e8"/>
      <path d="M50 157l4-2-1 2 1 2z" fill="#08080b"/>
    </g>
  </g>
</svg>
