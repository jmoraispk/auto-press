<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0d12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <link rel="stylesheet" href="/static/style.css">
  <title>auto-press</title>
</head>
<body>
  <header>
    <h1>auto-press</h1>
  </header>

  <main>
    <section id="windows-section">
      <ul id="windows" aria-label="Cursor windows"></ul>
      <p id="empty-hint" class="muted" hidden>
        No windows configured. Open the desktop app, switch to the Bridge tab, capture
        an idle template, and add a window — they'll show up here as the bridge runs.
      </p>
    </section>

    <section id="snapshots-section" hidden>
      <button id="snap-back" class="ghost" aria-label="Back to windows">← Back</button>
      <h2 id="snap-window-name"></h2>
      <p id="snap-empty" class="muted" hidden>No snapshots yet — wait for the next tick.</p>
      <div id="snapshots"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
