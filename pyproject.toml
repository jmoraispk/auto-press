[project]
name = "auto-press"
version = "3.0.0"
description = "Auto clicker with optional Enter key press, global hotkeys, and calibration"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pyautogui>=0.9.54",
    "pytest>=8.0.0",
]

[project.optional-dependencies]
vision = [
    "numpy>=1.26.0",
    "opencv-python>=4.10.0",
    "pillow>=10.0.0",
]

[project.scripts]
auto-press = "main_press:main"
